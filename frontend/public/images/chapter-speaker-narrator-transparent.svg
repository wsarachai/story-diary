<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 620" fill="none">

  <!-- Body / shirt -->
  <path d="M60 620 L60 490 Q60 448 105 435 L200 415 Q235 468 270 472 Q305 468 340 415 L435 435 Q480 448 480 490 L480 620 Z" fill="#3A8FA8"/>

  <!-- Shirt shadow / V-collar depth -->
  <path d="M200 415 Q235 462 270 466 Q305 462 340 415 L325 428 Q300 456 270 460 Q240 456 215 428 Z" fill="#2D7A90"/>

  <!-- Neck -->
  <path d="M232 388 L232 430 Q251 442 270 443 Q289 442 308 430 L308 388 Q289 398 270 399 Q251 398 232 388 Z" fill="#E8907A"/>

  <!-- Head -->
  <ellipse cx="270" cy="262" rx="148" ry="158" fill="#E8907A"/>

  <!-- Short hair — back layer -->
  <path d="M122 195 Q110 130 160 100 Q200 76 270 72 Q340 76 380 100 Q430 130 418 195 Q400 148 270 142 Q140 148 122 195 Z" fill="#180E09"/>

  <!-- Short hair — top volume -->
  <path d="M138 188 Q155 128 270 118 Q385 128 402 188 Q375 152 270 148 Q165 152 138 188 Z" fill="#251409"/>

  <!-- Short hair — sides (fade cut) -->
  <path d="M122 195 Q114 240 118 290 Q126 262 138 235 Z" fill="#180E09"/>
  <path d="M418 195 Q426 240 422 290 Q414 262 402 235 Z" fill="#180E09"/>

  <!-- Ears -->
  <ellipse cx="124" cy="278" rx="22" ry="28" fill="#D97B65"/>
  <ellipse cx="416" cy="278" rx="22" ry="28" fill="#D97B65"/>
  <ellipse cx="124" cy="278" rx="14" ry="19" fill="#E8907A"/>
  <ellipse cx="416" cy="278" rx="14" ry="19" fill="#E8907A"/>

  <!-- Face centre shadow (nose bridge) -->
  <rect x="262" y="175" width="16" height="95" rx="8" fill="#D4795F" opacity="0.18"/>

  <!-- Eyebrows — thicker/straighter than girl's -->
  <path d="M188 218 Q220 207 256 215" stroke="#180E09" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M284 215 Q320 207 352 218" stroke="#180E09" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="222" cy="254" rx="26" ry="24" fill="#180E09"/>
  <ellipse cx="222" cy="254" rx="17" ry="16" fill="#3A1E0C"/>
  <ellipse cx="213" cy="246" rx="8" ry="7" fill="white"/>
  <ellipse cx="318" cy="254" rx="26" ry="24" fill="#180E09"/>
  <ellipse cx="318" cy="254" rx="17" ry="16" fill="#3A1E0C"/>
  <ellipse cx="309" cy="246" rx="8" ry="7" fill="white"/>

  <!-- Eyelid line (upper lid) -->
  <path d="M197 242 Q222 234 247 242" stroke="#180E09" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M293 242 Q318 234 343 242" stroke="#180E09" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M261 292 Q270 310 279 292" stroke="#C96E58" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <ellipse cx="256" cy="305" rx="10" ry="7" fill="#C96E58" opacity="0.55"/>
  <ellipse cx="284" cy="305" rx="10" ry="7" fill="#C96E58" opacity="0.55"/>

  <!-- Rosy cheeks -->
  <ellipse cx="183" cy="308" rx="42" ry="26" fill="#E05C72" opacity="0.28"/>
  <ellipse cx="357" cy="308" rx="42" ry="26" fill="#E05C72" opacity="0.28"/>

  <!-- Mouth / smile -->
  <path d="M214 340 Q270 378 326 340" stroke="#180E09" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Teeth -->
  <clipPath id="tc">
    <path d="M218 346 Q270 376 322 346 L322 362 Q270 375 218 362 Z"/>
  </clipPath>
  <rect x="210" y="344" width="120" height="30" fill="white" clip-path="url(#tc)"/>
  <!-- Smile crease lines -->
  <path d="M214 340 Q200 355 206 370" stroke="#C96E58" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M326 340 Q340 355 334 370" stroke="#C96E58" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.55"/>

</svg>
