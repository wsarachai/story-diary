<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Minigame Quiz Feedback</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            padding: 7% 6% 6% 7%;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 2.2rem;
        }

        .page-right {
            padding: 7% 7% 6% 6%;
            display: grid;
            grid-template-rows: 1fr auto;
            gap: 2.4rem;
        }

        /* ── Progress ── */
        .quiz-progress-row {
            display: flex;
            align-items: center;
            gap: 1.4rem;
        }

        .quiz-counter {
            margin: 0;
            font-size: 44px;
            font-weight: 700;
            color: var(--panel-blue-deep);
            white-space: nowrap;
        }

        .quiz-progress-bar {
            flex: 1;
            height: 1.4rem;
            border-radius: 999px;
            background: rgba(89,214,220,0.3);
            overflow: hidden;
        }

        .quiz-progress-fill {
            height: 100%;
            border-radius: 999px;
            background: #59d6dc;
        }

        /* ── Question ── */
        .quiz-question-label {
            margin: 0;
            font-size: 40px;
            font-weight: 600;
            color: rgba(13,18,23,0.55);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .quiz-question-card {
            border-radius: 36px;
            background: #59d6dc;
            padding: 2.4rem 2.8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quiz-question-text {
            margin: 0;
            font-size: 54px;
            font-weight: 600;
            line-height: 1.35;
            color: #fff;
        }

        /* ── Answer options ── */
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.4rem;
        }

        .quiz-option {
            border-radius: 28px;
            background: #edf9fa;
            border: 4px solid #59d6dc;
            padding: 1.4rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.4rem;
            text-align: left;
        }

        /* Correct answer: green */
        .quiz-option.is-correct {
            background: #d4f7e2;
            border-color: #08c65a;
        }

        .quiz-option.is-correct .option-letter {
            background: #08c65a;
        }

        /* Wrong answer selected: red */
        .quiz-option.is-wrong {
            background: #ffe0e0;
            border-color: #ff4d4d;
        }

        .quiz-option.is-wrong .option-letter {
            background: #ff4d4d;
        }

        .option-letter {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            background: #59d6dc;
            display: grid;
            place-items: center;
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 44px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.2;
        }

        /* ── Feedback banner ── */
        .feedback-banner {
            border-radius: 28px;
            padding: 1.2rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .feedback-banner.correct { background: #08c65a; }
        .feedback-banner.wrong   { background: #ff4d4d; }

        .feedback-icon {
            width: 3.6rem;
            height: 3.6rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .feedback-icon svg {
            width: 2.2rem;
            height: 2.2rem;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
        }

        .feedback-text {
            flex: 1;
            font-size: 44px;
            font-weight: 700;
            color: #fff;
        }

        .feedback-next-btn {
            border-radius: 999px;
            background: rgba(255,255,255,0.25);
            color: #fff;
            border: 3px solid rgba(255,255,255,0.6);
            padding: 0.6rem 2rem;
            font-size: 40px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* ── Nav rail ── */
        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #c771e8;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Minigame Quiz Feedback">
        <section class="book-shell book-shell-tight">

            <!-- Left page: question (answered) -->
            <section class="page page-left page-seam-right" aria-label="คำถาม">
                <div class="quiz-progress-row">
                    <p class="quiz-counter">บททดสอบที่ <strong>3</strong>/13</p>
                    <div class="quiz-progress-bar" aria-hidden="true">
                        <div class="quiz-progress-fill" style="width: 23%;"></div>
                    </div>
                </div>

                <p class="quiz-question-label">โจทย์</p>

                <div class="quiz-question-card">
                    <p class="quiz-question-text">
                        ควรหลีกเลี่ยงแสงแดดในช่วงเวลาใด<br>เพื่อป้องกันผิวหนังจากแสงยูวี?
                    </p>
                </div>
            </section>

            <!-- Right page: options with feedback highlight + next button -->
            <section class="page page-right" aria-label="ผลคำตอบ">
                <div class="quiz-options" role="group" aria-label="คำตอบ">
                    <div class="quiz-option" aria-label="ตัวเลือก A ไม่ถูก">
                        <span class="option-letter">A</span>
                        <span class="option-text">06:00 – 09:00 น.</span>
                    </div>
                    <!-- B = correct answer -->
                    <div class="quiz-option is-correct" aria-label="ตัวเลือก B ถูกต้อง">
                        <span class="option-letter">B</span>
                        <span class="option-text">10:00 – 17:00 น.</span>
                    </div>
                    <!-- C = wrong choice selected by user -->
                    <div class="quiz-option is-wrong" aria-label="ตัวเลือก C ตอบผิด">
                        <span class="option-letter">C</span>
                        <span class="option-text">17:00 – 19:00 น.</span>
                    </div>
                    <div class="quiz-option" aria-label="ตัวเลือก D ไม่ถูก">
                        <span class="option-letter">D</span>
                        <span class="option-text">ทุกช่วงเวลา</span>
                    </div>
                </div>

                <!-- Feedback banner: wrong answer variant — swap class to .correct for correct variant -->
                <div class="feedback-banner wrong" role="alert" aria-live="assertive">
                    <div class="feedback-icon">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </div>
                    <span class="feedback-text">ตอบผิด — คำตอบที่ถูกคือ B</span>
                    <a class="feedback-next-btn" href="s031-minigame-quiz-summary.html" aria-label="ไปหน้าสรุปบททดสอบ">เดินทางต่อ →</a>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม" aria-current="page">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
