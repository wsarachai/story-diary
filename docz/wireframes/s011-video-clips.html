<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Video Clips</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            padding: 7% 6% 7% 7%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 1.2rem;
        }

        .page-right {
            padding: 7% 7% 7% 6%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 1.2rem;
        }

        .clip-section-label {
            font-size: 2.6rem;
            font-weight: 600;
            color: #2e7aaa;
            line-height: 1.1;
        }

        .clip-section-label-badge {
            display: inline-block;
            background: #59d6dc;
            border-radius: 1.4rem;
            padding: 0.5rem 1.4rem 0.6rem;
            font-size: 2.2rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            line-height: 1.2;
        }

        .clip-thumbnail {
            background: #59d6dc;
            border-radius: 2.4rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .clip-thumbnail-left {
            border-radius: 2.4rem;
        }

        .clip-thumbnail-right {
            border-radius: 2.4rem;
        }

        .clip-play-icon {
            width: 5rem;
            height: 5rem;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
        }

        .clip-play-icon svg {
            width: 2rem;
            height: 2rem;
            fill: #2e7aaa;
            margin-left: 0.3rem;
        }

        .clip-caption {
            font-size: 2.6rem;
            font-weight: 600;
            color: #2e7aaa;
        }

        /* sparkle stars bottom-right of right page */
        .sparkle-group {
            position: absolute;
            bottom: 1.8rem;
            right: 1.6rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0.4rem;
            align-items: end;
            pointer-events: none;
        }

        .sparkle {
            fill: #e8c84a;
            opacity: 0.9;
        }

        .sparkle-lg {
            width: 5.6rem;
            height: 5.6rem;
        }

        .sparkle-md {
            width: 3.8rem;
            height: 3.8rem;
        }

        .sparkle-sm {
            width: 2.8rem;
            height: 2.8rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #08c65a;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Video Clips">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">

            <!-- Left page: clip 1 -->
            <section class="page page-left page-seam-right" aria-label="คลิปที่ 1">
                <a class="clip-section-label-badge" href="s005-chapters.html" aria-label="ดาวแห่งการเรียนรู้ — กลับหน้าบท">
                    ดาวแห่งการเรียนรู้
                </a>

                <div class="clip-thumbnail clip-thumbnail-left" aria-label="วิดีโอคลิป 1">
                    <div class="clip-play-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                </div>

                <div class="clip-caption" aria-label="คลิป 1">คลิป 1</div>
            </section>

            <!-- Right page: clip 2 -->
            <section class="page page-right" aria-label="คลิปที่ 2">
                <div class="clip-caption" aria-label="คลิป 2">คลิป 2</div>

                <div class="clip-thumbnail clip-thumbnail-right" aria-label="วิดีโอคลิป 2" style="position:relative;">
                    <div class="clip-play-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>

                    <div class="sparkle-group" aria-hidden="true">
                        <!-- top-left cell: medium -->
                        <svg class="sparkle sparkle-md" style="align-self:end; justify-self:end;" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                        <!-- top-right cell: small -->
                        <svg class="sparkle sparkle-sm" style="align-self:start;" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                        <!-- bottom-left cell: large -->
                        <svg class="sparkle sparkle-lg" style="align-self:end; justify-self:end;" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                        <!-- bottom-right cell: medium -->
                        <svg class="sparkle sparkle-md" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                    </div>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง" aria-current="page">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้าสร้างตัวละคร">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
</body>
</html>
