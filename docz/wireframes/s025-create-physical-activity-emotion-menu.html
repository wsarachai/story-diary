<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Physical Activity Emotion Menu</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 5% 6% 5%;
            grid-column: 1 / 3;
            display: flex;
        }

        .emotion-card {
            width: 100%;
            border-radius: 36px;
            border: 3px solid #59d6dc;
            background: #f2ede5;
            box-shadow: 0 16px 48px -12px rgba(13,18,35,0.22);
            padding: 1.6rem 2.4rem 2.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .emotion-title {
            margin: 0 auto;
            width: min(100%, 760px);
            text-align: center;
            font-size: 82px;
            font-weight: 700;
            line-height: 1;
            border-bottom: 6px solid #111;
            padding-bottom: 0.45rem;
        }

        .emotion-list {
            margin: 0;
            padding: 0.2rem 0 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.35rem;
            align-items: flex-start;
        }

        .emotion-item {
            border: none;
            border-radius: 24px;
            background: #cfcac3;
            font-family: inherit;
            font-size: 68px;
            line-height: 1.1;
            color: #0f0f0f;
            text-align: left;
            padding: 0.75rem 1.1rem;
            width: fit-content;
            max-width: 100%;
            cursor: pointer;
        }

        .emotion-item:hover {
            background: #bfb9b2;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Physical Activity Emotion Menu">
        <section class="book-shell book-shell-tight">

            <section class="page" aria-label="เมนูการจัดการอารมณ์">
                <div class="emotion-card" role="dialog" aria-modal="true" aria-labelledby="emotion-title">
                    <h2 class="emotion-title" id="emotion-title">การจัดการอารมณ์</h2>

                    <ul class="emotion-list" aria-label="รายการการจัดการอารมณ์">
                        <li><button class="emotion-item" type="button" data-navigate="s029-create-physical-activity.html?name=สำรวจอารมณ์ตนเอง">สำรวจอารมณ์ตนเอง</button></li>
                        <li><button class="emotion-item" type="button" data-navigate="s029-create-physical-activity.html?name=งานอดิเรก/กิจกรรมคลายเครียด">งานอดิเรก/กิจกรรมคลายเครียด</button></li>
                        <li><button class="emotion-item" type="button" data-navigate="s029-create-physical-activity.html?name=นอนหลับพักผ่อน">นอนหลับพักผ่อน</button></li>
                    </ul>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
