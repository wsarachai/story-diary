<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Chapters</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .page-left,
        .page-right {
            padding: 8% 8% 7%;
        }

        .chapters-menu {
            height: 100%;
            display: grid;
            align-content: start;
        }

        .chapter-title {
            margin: 0;
            font-size: 88px;
            font-weight: 500;
            line-height: 1;
        }

        .chapter-title-rule {
            width: 100%;
            height: 5px;
            margin: 1.15rem 0 1.9rem;
            border-radius: 999px;
            background: #111;
        }

        .chapter-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 2rem;
        }

        .chapter-row {
            display: block;
        }

        .chapter-row-link {
            display: grid;
            grid-template-columns: 8.2rem 1fr;
            align-items: center;
            column-gap: 1.9rem;
            text-decoration: none;
            color: inherit;
        }

        .pin {
            position: relative;
            display: grid;
            justify-items: center;
            width: 8.2rem;
        }

        .pin-circle {
            width: 6.3rem;
            height: 6.3rem;
            border: 0.58rem solid #ff3131;
            border-radius: 50%;
            background: #fbf3e6;
            display: grid;
            place-items: center;
            font-size: 4.15rem;
            line-height: 1;
            color: #ff3131;
            font-weight: 500;
        }

        .pin-tip {
            width: 0;
            height: 0;
            border-left: 2.25rem solid transparent;
            border-right: 2.25rem solid transparent;
            border-top: 2.85rem solid #ff3131;
            margin-top: -0.5rem;
        }

        .pin-base {
            width: 7.3rem;
            height: 2.15rem;
            margin-top: -0.35rem;
            border: 0.35rem solid #ff3131;
            border-radius: 50%;
            background: transparent;
        }

        .pin-link {
            position: absolute;
            left: 49%;
            top: 100%;
            width: 0.34rem;
            height: 3.7rem;
            transform: translateX(-50%) rotate(38deg);
            background: repeating-linear-gradient(
                to bottom,
                #ff4f4f 0 0.78rem,
                transparent 0.78rem 1.2rem
            );
            transform-origin: top center;
        }

        .chapter-pill {
            min-height: 8.95rem;
            border-radius: 2.15rem;
            background: #59d6dc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.45rem 0 2.15rem;
        }

        .chapter-pill-text {
            font-size: 86px;
            line-height: 1;
        }

        .lock-icon {
            width: 3.35rem;
            height: 3.35rem;
            flex: 0 0 auto;
        }

        .page-right .chapter-list {
            margin-top: 0.8rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #08c65a;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">

                                <div class="pin" aria-hidden="true">

                                    <div class="pin-tip"></div>

                                </div>
                                <div class="chapter-pill">

                                    <img class="lock-icon" src="assets/icons/lock-key.svg" alt="ล็อก" aria-hidden="true">
                                </div>
                            </a>

                        <li class="chapter-row">
                            <a class="chapter-row-link" href="s009-chapters-explain.html" aria-label="ไปหน้าบทบรรยาย บทที่ 5">
                                <div class="pin" aria-hidden="true">
                                    <div class="pin-circle">05</div>

                                </div>

                    </ol>
                </article>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">

                <a class="icon-rail-link is-active" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง" aria-current="page">

            </nav>
        </section>
    </main>
</body>
</html>
