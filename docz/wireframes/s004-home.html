<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Home</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .story-card {
            width: 72%;
            height: 86%;
            border-radius: 38% 38% 9% 9% / 20% 20% 9% 9%;
            background: #55d0d7;
            position: relative;
            overflow: hidden;
        }

        .story-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: inherit;
        }

        .story-card-title {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 10%;
            margin: 0;
            text-align: center;
            font-size: 56px;
            font-weight: 500;
            z-index: 1;
        }

        .dashboard {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3rem;
            padding-top: 8%;
        }


        .feature-card {
            position: relative;
            border-radius: 48px;
            background: #59d6dc;
            padding: 1.6rem 1.8rem;
            min-height: 210px;
        }

        .feature-card h2 {
            margin: 0;
            font-size: 40px;
            font-weight: 500;
            line-height: 1.05;
        }

        .minigame-card {
            align-self: end;
            min-height: 200px;
            padding-top: 2.3rem;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .minigame-hearts {
            position: absolute;
            left: 1.88rem;
            top: 1.5rem;
            display: flex;
            gap: 0.45rem;
        }

        .minigame-hearts img {
            width: 3rem;
            height: 3rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #ff3131;
            z-index: 0;
        }

    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Home Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Story summary preview">
                <article class="story-card">
                    <img src="images/story-preview-870x975.svg" class="story-bg-img" alt="" aria-hidden="true">
                    <h1 class="story-card-title">เนื้อเรื่อง</h1>
                </article>
            </section>

            <section class="page page-right" aria-label="Home navigation and features">
                <div class="dashboard">
                    <section class="feature-card" data-navigate="s006-habit-tracker.html" role="link" aria-label="ไปหน้า Habit tracker" tabindex="0">
                        <h2>Habit tracker</h2>
                    </section>

                    <section class="feature-card minigame-card" data-navigate="s007-minigame.html" role="link" aria-label="ไปหน้ามินิเกม" tabindex="0">
                        <div class="minigame-hearts" aria-hidden="true">
                            <img src="assets/icons/heart.svg" alt="">
                            <img src="assets/icons/heart.svg" alt="">
                            <img src="assets/icons/heart.svg" alt="">
                        </div>
                        <h2>Minigame</h2>
                    </section>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link is-active" href="s004-home.html" aria-label="ไปหน้าแรก" aria-current="page">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้าสร้างตัวละคร">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>
        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
