<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Explore Emotion Checkin</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 5% 6% 5%;
            grid-column: 1 / 3;
            display: flex;
        }

        .checkin-card {
            width: 100%;
            border-radius: 36px;
            border: 3px solid #59d6dc;
            background: #f2ede5;
            box-shadow: 0 16px 48px -12px rgba(13,18,35,0.22);
            padding: 1.6rem 2.4rem 2.6rem;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        /* Header */
        .checkin-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1.4rem;
        }

        .action-btn {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            border: 6px solid #1f1f1f;
            background: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .action-btn svg {
            width: 3.2rem;
            height: 3.2rem;
            stroke: #161616;
            stroke-width: 3;
            fill: none;
        }

        .checkin-title {
            margin: 0;
            text-align: center;
            font-size: 72px;
            font-weight: 700;
            border-bottom: 6px solid #111;
            line-height: 1;
            padding-bottom: 0.45rem;
        }

        /* Badge row */
        .badge-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .activity-badge {
            border-radius: 22px;
            background: #f0a8c8;
            color: #1a1a1a;
            font-size: 66px;
            line-height: 1.05;
            padding: 0.75rem 1.3rem;
            width: fit-content;
        }

        .badge-icon {
            font-size: 3.2rem;
            line-height: 1;
        }

        /* Mood label */
        .mood-label {
            margin: 0;
            font-size: 72px;
            font-weight: 600;
            line-height: 1.05;
        }

        /* Emoji row */
        .emoji-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .mood-emoji {
            width: 5.6rem;
            height: 5.6rem;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
            transition: transform 0.12s;
            flex: 1;
        }

        .mood-emoji:hover {
            transform: scale(1.12);
        }

        .mood-emoji.is-selected {
            outline: 5px solid #333;
            outline-offset: 4px;
        }

        .mood-emoji svg {
            width: 90%;
            height: 90%;
        }

        /* Gradient slider */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .slider-sign {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1;
            flex-shrink: 0;
            color: #e05a5a;
        }

        .slider-sign.plus {
            color: #3aab3a;
        }

        .mood-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 1.4rem;
            border-radius: 999px;
            background: linear-gradient(to right,
                #d63a3a 0%,
                #e8763a 25%,
                #e8c23a 50%,
                #8dc63a 75%,
                #3aab3a 100%
            );
            outline: none;
            cursor: pointer;
        }

        .mood-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 2.8rem;
            height: 2.8rem;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #555;
            cursor: pointer;
        }

        .mood-slider::-moz-range-thumb {
            width: 2.8rem;
            height: 2.8rem;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #555;
            cursor: pointer;
        }

        /* Icon rail */
        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Explore Emotion Checkin">
        <section class="book-shell book-shell-tight">

            <section class="page" aria-label="สำรวจอารมณ์ตนเอง">
                <div class="checkin-card" role="dialog" aria-modal="true" aria-labelledby="checkin-title">

                    <header class="checkin-header">
                        <button class="action-btn" aria-label="ยกเลิก" data-navigate="s025-create-physical-activity-emotion-menu.html">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                        <h2 class="checkin-title" id="checkin-title">เพิ่มกิจกรรม</h2>
                        <button class="action-btn" aria-label="บันทึก" data-navigate="s012-habit-daily-today.html">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </header>

                    <div class="badge-row">
                        <span class="activity-badge">สำรวจอารมณ์ตนเอง</span>
                        <span class="badge-icon" aria-hidden="true">🙂</span>
                    </div>

                    <p class="mood-label">อารมณ์ในวันนี้</p>

                    <div class="emoji-row" role="group" aria-label="เลือกอารมณ์">
                        <!-- Very bad: red angry -->
                        <button class="mood-emoji" type="button" aria-label="แย่มาก" style="background:#d63a3a;">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="48" fill="#d63a3a"/>
                                <!-- angry brows -->
                                <line x1="28" y1="34" x2="44" y2="42" stroke="#3a0000" stroke-width="5" stroke-linecap="round"/>
                                <line x1="72" y1="34" x2="56" y2="42" stroke="#3a0000" stroke-width="5" stroke-linecap="round"/>
                                <!-- eyes -->
                                <circle cx="36" cy="50" r="5" fill="#3a0000"/>
                                <circle cx="64" cy="50" r="5" fill="#3a0000"/>
                                <!-- frown -->
                                <path d="M34 70 Q50 58 66 70" stroke="#3a0000" stroke-width="5" stroke-linecap="round" fill="none"/>
                            </svg>
                        </button>
                        <!-- Bad: orange sad -->
                        <button class="mood-emoji" type="button" aria-label="แย่" style="background:#e8763a;">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="48" fill="#e8763a"/>
                                <circle cx="36" cy="46" r="5" fill="#5a2000"/>
                                <circle cx="64" cy="46" r="5" fill="#5a2000"/>
                                <path d="M36 68 Q50 58 64 68" stroke="#5a2000" stroke-width="5" stroke-linecap="round" fill="none"/>
                            </svg>
                        </button>
                        <!-- Neutral: yellow -->
                        <button class="mood-emoji" type="button" aria-label="เฉยๆ" style="background:#e8c23a;">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="48" fill="#e8c23a"/>
                                <circle cx="36" cy="45" r="5" fill="#5a4000"/>
                                <circle cx="64" cy="45" r="5" fill="#5a4000"/>
                                <line x1="36" y1="67" x2="64" y2="67" stroke="#5a4000" stroke-width="5" stroke-linecap="round"/>
                            </svg>
                        </button>
                        <!-- Good: light green -->
                        <button class="mood-emoji" type="button" aria-label="ดี" style="background:#8dc63a;">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="48" fill="#8dc63a"/>
                                <circle cx="36" cy="44" r="5" fill="#1a3a00"/>
                                <circle cx="64" cy="44" r="5" fill="#1a3a00"/>
                                <path d="M36 62 Q50 74 64 62" stroke="#1a3a00" stroke-width="5" stroke-linecap="round" fill="none"/>
                            </svg>
                        </button>
                        <!-- Very good: green happy -->
                        <button class="mood-emoji" type="button" aria-label="ดีมาก" style="background:#3aab3a;">
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="48" fill="#3aab3a"/>
                                <circle cx="36" cy="42" r="5" fill="#003a00"/>
                                <circle cx="64" cy="42" r="5" fill="#003a00"/>
                                <path d="M32 60 Q50 78 68 60" stroke="#003a00" stroke-width="5" stroke-linecap="round" fill="none"/>
                                <!-- open mouth hint -->
                                <path d="M36 62 Q50 72 64 62 Q50 80 36 62" fill="#003a00" opacity="0.25"/>
                            </svg>
                        </button>
                    </div>

                    <div class="slider-row">
                        <span class="slider-sign" aria-hidden="true">−</span>
                        <input
                            class="mood-slider"
                            type="range"
                            min="1"
                            max="100"
                            value="60"
                            aria-label="ระดับอารมณ์"
                            id="mood-slider"
                        >
                        <span class="slider-sign plus" aria-hidden="true">+</span>
                    </div>

                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
    <script>
        const emojis = document.querySelectorAll('.mood-emoji');
        const slider = document.getElementById('mood-slider');

        // Emoji click → select & sync slider
        emojis.forEach((btn, i) => {
            btn.addEventListener('click', () => {
                emojis.forEach(b => b.classList.remove('is-selected'));
                btn.classList.add('is-selected');
                slider.value = Math.round((i / (emojis.length - 1)) * 100);
            });
        });

        // Sync slider → highlight nearest emoji
        slider.addEventListener('input', () => {
            const val = parseInt(slider.value);
            const idx = Math.round((val / 100) * (emojis.length - 1));
            emojis.forEach(b => b.classList.remove('is-selected'));
            emojis[idx].classList.add('is-selected');
        });

        // Init selection
        slider.dispatchEvent(new Event('input'));
    </script>
</body>
</html>
