<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Create Physical Activity Form</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 5% 6% 5%;
            grid-column: 1 / 3;
            display: flex;
        }

        .create-card {
            width: 100%;
            border-radius: 36px;
            border: 3px solid #59d6dc;
            background: #f2ede5;
            box-shadow: 0 16px 48px -12px rgba(13,18,35,0.22);
            padding: 1.6rem 2.4rem 2.4rem;
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        /* Header */
        .create-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1.4rem;
        }

        .action-btn {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            border: 6px solid #1f1f1f;
            background: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .action-btn svg {
            width: 3.2rem;
            height: 3.2rem;
            stroke: #161616;
            stroke-width: 3;
            fill: none;
        }

        .create-title {
            margin: 0;
            text-align: center;
            font-size: 72px;
            font-weight: 700;
            border-bottom: 6px solid #111;
            line-height: 1;
            padding-bottom: 0.45rem;
        }

        /* Badge row */
        .badge-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .activity-badge {
            border-radius: 22px;
            background: #6a24f2;
            color: #fff;
            font-size: 66px;
            line-height: 1.05;
            padding: 0.75rem 1.3rem;
            width: fit-content;
        }

        .activity-badge[readonly] {
            cursor: default;
            outline: none;
        }

        .activity-badge:not([readonly]) {
            border: 4px solid #3a0ab5;
            background: #7c35ff;
        }

        .badge-dot {
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 50%;
            background: #6a24f2;
            flex-shrink: 0;
        }

        /* Chip rows */
        .chip-line {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            min-height: 5rem;
        }

        .chip-label {
            font-size: 68px;
            line-height: 1;
            color: #111;
            min-width: 9rem;
            flex-shrink: 0;
        }

        .chip-track {
            flex: 1;
            border-radius: 24px;
            background: #b4b7bc;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            min-height: 4.9rem;
        }

        .chip {
            border: none;
            border-radius: 20px;
            background: transparent;
            color: #f5f2ea;
            font-family: inherit;
            font-size: 58px;
            line-height: 1;
            padding: 0.55rem 1rem 0.65rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .chip.is-selected {
            background: #6a24f2;
            color: #fff;
        }

        /* Count input panel */
        .count-panel {
            display: none;
            margin-left: calc(9rem + 1.1rem);
        }

        .count-panel.is-active {
            display: flex;
        }

        .count-track {
            border-radius: 24px;
            background: #b4b7bc;
            padding: 0.25rem 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            min-height: 4.9rem;
        }

        .count-input {
            width: 4.5rem;
            height: 4rem;
            border-radius: 14px;
            border: 4px solid #6a24f2;
            background: #fff;
            font-family: inherit;
            font-size: 58px;
            line-height: 1;
            text-align: center;
            color: #111;
            padding: 0;
            outline: none;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .count-input::-webkit-outer-spin-button,
        .count-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .count-unit {
            font-size: 58px;
            line-height: 1;
            color: #f5f2ea;
        }

        /* Frequency sub-panels */
        .freq-panel {
            display: none;
            margin-left: calc(9rem + 1.1rem);
        }

        .freq-panel.is-active {
            display: block;
        }

        /* Daily: weekday buttons */
        .weekday-row {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0.8rem;
        }

        .weekday {
            border: none;
            border-radius: 18px;
            font-family: inherit;
            font-size: 58px;
            line-height: 1;
            background: #b4b7bc;
            color: #f5f2ea;
            min-height: 5rem;
            cursor: pointer;
        }

        .weekday.is-selected {
            background: #6a24f2;
            color: #fff;
            box-shadow: inset 0 0 0 4px #2f233f;
        }

        /* Weekly / Monthly: count row */
        .freq-count-row {
            border-radius: 24px;
            background: #b4b7bc;
            padding: 0.2rem 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            min-height: 4.9rem;
            width: fit-content;
        }

        .freq-count-input {
            width: 5.5rem;
            min-height: 4rem;
            border-radius: 18px;
            border: 4px solid #6a24f2;
            color: #6a24f2;
            background: #f2ede5;
            font-family: inherit;
            font-size: 60px;
            line-height: 1;
            text-align: center;
            padding: 0;
            outline: none;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .freq-count-input::-webkit-outer-spin-button,
        .freq-count-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .freq-count-unit {
            font-size: 58px;
            line-height: 1;
            color: #f5f2ea;
        }

        /* Icon rail */
        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Create Physical Activity Form">
        <section class="book-shell book-shell-tight">

            <section class="page" aria-label="สร้างกิจกรรมออกกำลังกาย">
                <div class="create-card" role="dialog" aria-modal="true" aria-labelledby="create-title">

                    <header class="create-header">
                        <button class="action-btn" aria-label="ยกเลิก" data-navigate="s024-create-physical-activity-menu.html">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                        <h2 class="create-title" id="create-title">เพิ่มกิจกรรม</h2>
                        <button class="action-btn" aria-label="บันทึก" data-navigate="s012-habit-daily-today.html">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </header>

                    <div class="badge-row">
                        <input class="activity-badge" id="activity-badge" type="text" value="กิจกรรม XXX" aria-label="ชื่อกิจกรรม" readonly>
                        <span class="badge-dot" aria-hidden="true"></span>
                    </div>

                    <!-- เป้าหมาย -->
                    <div class="chip-line">
                        <span class="chip-label">เป้าหมาย</span>
                        <div class="chip-track" role="group" aria-label="เป้าหมาย">
                            <button class="chip is-selected" type="button" data-group="goal">ครั้งเดียว</button>
                            <button class="chip" type="button" data-group="goal">นับจำนวนครั้ง</button>
                        </div>
                    </div>

                    <!-- Count panel (shown when นับจำนวนครั้ง selected) -->
                    <div class="count-panel" id="count-panel" aria-live="polite">
                        <div class="count-track">
                            <input class="count-input" type="number" min="1" value="1" aria-label="จำนวนครั้ง" id="count-input">
                            <span class="count-unit">ครั้ง</span>
                        </div>
                    </div>

                    <!-- ความถี่ -->
                    <div class="chip-line">
                        <span class="chip-label">ความถี่</span>
                        <div class="chip-track" role="group" aria-label="ความถี่">
                            <button class="chip" type="button" data-group="frequency" data-freq="daily">ทุกวัน</button>
                            <button class="chip" type="button" data-group="frequency" data-freq="weekly">สัปดาห์</button>
                            <button class="chip" type="button" data-group="frequency" data-freq="monthly">เดือน</button>
                            <button class="chip is-selected" type="button" data-group="frequency" data-freq="todo">To-do</button>
                        </div>
                    </div>

                    <!-- Daily: weekday picker -->
                    <div class="freq-panel" id="freq-daily">
                        <div class="weekday-row" role="group" aria-label="เลือกวัน">
                            <button class="weekday" type="button">อา</button>
                            <button class="weekday is-selected" type="button">จ</button>
                            <button class="weekday is-selected" type="button">อ</button>
                            <button class="weekday is-selected" type="button">พ</button>
                            <button class="weekday is-selected" type="button">พฤ</button>
                            <button class="weekday is-selected" type="button">ศ</button>
                            <button class="weekday" type="button">ส</button>
                        </div>
                    </div>

                    <!-- Weekly: count input -->
                    <div class="freq-panel" id="freq-weekly">
                        <div class="freq-count-row">
                            <input class="freq-count-input" type="number" min="1" max="7" value="3" aria-label="จำนวนวันต่อสัปดาห์">
                            <span class="freq-count-unit">วัน/สัปดาห์</span>
                        </div>
                    </div>

                    <!-- Monthly: count input -->
                    <div class="freq-panel" id="freq-monthly">
                        <div class="freq-count-row">
                            <input class="freq-count-input" type="number" min="1" max="31" value="3" aria-label="จำนวนวันต่อเดือน">
                            <span class="freq-count-unit">วัน/เดือน</span>
                        </div>
                    </div>

                    <!-- ความสำคัญ (shown only when To-do frequency selected) -->
                    <div class="chip-line" id="importance-panel" style="display:none">
                        <span class="chip-label">ความสำคัญ</span>
                        <div class="chip-track" role="group" aria-label="ความสำคัญ">
                            <button class="chip" type="button" data-group="importance">ทั่วไป</button>
                            <button class="chip" type="button" data-group="importance">ปานกลาง</button>
                            <button class="chip is-selected" type="button" data-group="importance">มาก</button>
                        </div>
                    </div>

                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
    <script>
        // Fill badge from URL param
        const activityName = new URLSearchParams(window.location.search).get('name');
        const badgeEl = document.getElementById('activity-badge');
        if (activityName) {
            badgeEl.value = activityName;
        }
        // Allow editing only for "อื่น ๆ" or "other"
        if (activityName === 'other') {
            badgeEl.removeAttribute('readonly');
            badgeEl.value = "อื่น ๆ";
            badgeEl.focus();
        }

        const countPanel = document.getElementById('count-panel');

        // Single-select chips within each group
        document.querySelectorAll('.chip[data-group]').forEach(chip => {
            chip.addEventListener('click', () => {
                const group = chip.dataset.group;
                document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('is-selected'));
                chip.classList.add('is-selected');

                // Toggle count panel for goal group
                if (group === 'goal') {
                    countPanel.classList.toggle('is-active', chip.textContent.trim() === 'นับจำนวนครั้ง');
                }

                // Toggle frequency sub-panels
                if (group === 'frequency') {
                    const freq = chip.dataset.freq;
                    ['daily','weekly','monthly'].forEach(f => {
                        document.getElementById('freq-' + f).classList.toggle('is-active', f === freq);
                    });
                    document.getElementById('importance-panel').style.display =
                        freq === 'todo' ? 'flex' : 'none';
                }
            });
        });

        // Weekday multi-select
        document.querySelectorAll('.weekday').forEach(btn => {
            btn.addEventListener('click', () => btn.classList.toggle('is-selected'));
        });

        // Init: activate panel matching currently selected frequency chip
        const initFreq = document.querySelector('.chip[data-group="frequency"].is-selected');
        if (initFreq) {
            const f = initFreq.dataset.freq;
            if (f && f !== 'todo') document.getElementById('freq-' + f)?.classList.add('is-active');
            document.getElementById('importance-panel').style.display = f === 'todo' ? 'flex' : 'none';
        }
    </script>
</body>
</html>
