<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Minigame Score</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
            padding: 8%;
        }

        .page-right {
            padding: 8% 7% 7%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
        }

        /* ── Left page: completion art ── */
        .score-complete-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.4rem;
            text-align: center;
        }

        .score-snake-art {
            width: 28rem;
            height: 28rem;
        }

        .score-complete-title {
            margin: 0;
            font-size: 72px;
            font-weight: 700;
            color: var(--panel-blue-deep);
            line-height: 1.1;
        }

        .score-complete-sub {
            margin: 0;
            font-size: 44px;
            color: rgba(13,18,23,0.55);
        }

        /* ── Right page: score display ── */
        .sparkle-cluster {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .sparkle-cluster svg {
            fill: #e8c84a;
        }

        .score-box {
            border-radius: 48px;
            background: #59d6dc;
            padding: 2.8rem 4rem;
            text-align: center;
            width: 100%;
            max-width: 38rem;
        }

        .score-box-label {
            margin: 0;
            font-size: 44px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
        }

        .score-box-value {
            margin: 0.6rem 0 0;
            font-size: 120px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .score-box-unit {
            font-size: 52px;
            font-weight: 400;
        }

        .score-detail-row {
            display: flex;
            gap: 1.6rem;
            justify-content: center;
        }

        .score-detail-chip {
            border-radius: 999px;
            background: #edf9fa;
            border: 3px solid #59d6dc;
            padding: 0.7rem 1.8rem;
            font-size: 38px;
            font-weight: 600;
            color: var(--panel-blue-deep);
            text-align: center;
        }

        .score-continue-btn {
            border-radius: 999px;
            background: #c771e8;
            color: #fff;
            border: none;
            padding: 1.2rem 4rem;
            font-size: 54px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 28px -8px rgba(199,113,232,0.5);
            transition: transform 0.15s;
        }

        .score-continue-btn:hover {
            transform: translateY(-2px);
        }

        /* ── Nav rail ── */
        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #c771e8;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Minigame Score">
        <section class="book-shell book-shell-tight">

            <!-- Left page: completion art + title -->
            <section class="page page-left page-seam-right" aria-label="การทดสอบเสร็จสิ้น">
                <div class="score-complete-wrap">
                    <!-- Decorative spiral / snake path art -->
                    <svg class="score-snake-art" viewBox="0 0 200 200" aria-hidden="true">
                        <defs>
                            <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#59d6dc"/>
                                <stop offset="100%" style="stop-color:#c771e8"/>
                            </linearGradient>
                        </defs>
                        <!-- spiral path -->
                        <path d="
                            M 100 100
                            m -5 0
                            a 5 5 0 1 0 10 0
                            a 5 5 0 1 0 -10 0
                            M 100 100
                            m -18 0
                            a 18 18 0 1 1 36 0
                            a 18 18 0 1 1 -36 0
                            M 100 100
                            m -34 0
                            a 34 34 0 1 0 68 0
                            a 34 34 0 1 0 -68 0
                            M 100 100
                            m -52 0
                            a 52 52 0 1 1 104 0
                            a 52 52 0 1 1 -104 0
                            M 100 100
                            m -72 0
                            a 72 72 0 1 0 144 0
                            a 72 72 0 1 0 -144 0
                        " fill="none" stroke="url(#snakeGrad)" stroke-width="6" stroke-linecap="round"/>
                        <!-- small snake head -->
                        <circle cx="168" cy="100" r="9" fill="#c771e8"/>
                        <circle cx="163" cy="96" r="3" fill="#fff"/>
                        <circle cx="163" cy="104" r="3" fill="#fff"/>
                    </svg>

                    <h1 class="score-complete-title">การทดสอบ<br>เสร็จสิ้น!</h1>
                    <p class="score-complete-sub">ทำข้อสอบครบ 13/13 ข้อ</p>
                </div>
            </section>

            <!-- Right page: score + continue -->
            <section class="page page-right" aria-label="คะแนนรวม">
                <div class="sparkle-cluster" aria-hidden="true">
                    <svg width="36" height="36" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                    <svg width="56" height="56" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                    <svg width="44" height="44" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                    <svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/></svg>
                </div>

                <div class="score-box" aria-label="คุณสะสมแต้มได้ทั้งหมด">
                    <p class="score-box-label">คุณสะสมแต้มได้ทั้งหมด</p>
                    <p class="score-box-value">91 <span class="score-box-unit">แต้ม</span></p>
                </div>

                <div class="score-detail-row" aria-label="สรุปผลทดสอบ">
                    <div class="score-detail-chip">ถูก 10 ข้อ</div>
                    <div class="score-detail-chip">ผิด 3 ข้อ</div>
                </div>

                <a class="score-continue-btn" href="s004-home.html" aria-label="เดินทางต่อ กลับหน้าหลัก">
                    เดินทางต่อ →
                </a>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม" aria-current="page">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
