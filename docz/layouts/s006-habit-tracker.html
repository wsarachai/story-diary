<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Habit Tracker</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .tracker-card {
            width: 72%;
            height: 86%;
            border-radius: 38% 38% 9% 9% / 20% 20% 9% 9%;
            background: #55d0d7;
            position: relative;
            overflow: hidden;
        }

        .tracker-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: inherit;
            opacity: 0.45;
        }

        .tracker-card-title {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 10%;
            margin: 0;
            text-align: center;
            font-size: 54px;
            font-weight: 500;
            z-index: 1;
        }

        .habit-dashboard {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3rem;
            padding-top: 8%;
        }

        .habit-card {
            border-radius: 48px;
            background: #59d6dc;
            padding: 1.8rem 2rem;
            min-height: 210px;
            position: relative;
            overflow: hidden;
        }

        .habit-card h2 {
            margin: 0;
            font-size: 40px;
            font-weight: 500;
            line-height: 1.05;
        }

        .streak-badge {
            position: absolute;
            right: 1.8rem;
            bottom: 1.6rem;
            width: 6.3rem;
            height: 6.3rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.52);
            display: grid;
            place-items: center;
            font-size: 1.7rem;
            font-weight: 700;
            color: #1d6377;
        }

        .habit-list {
            margin: 1.6rem 0 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 0.8rem;
        }

        .habit-list li {
            background: rgba(255, 255, 255, 0.42);
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            font-size: 1.05rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Habit Tracker Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Habit tracker summary preview">
                <article class="tracker-card">
                    <img src="images/story-preview-870x975.svg" class="tracker-bg-img" alt="" aria-hidden="true">
                    <h1 class="tracker-card-title">Habit tracker</h1>
                </article>
            </section>

            <section class="page page-right" aria-label="Habit tracker details">
                <div class="habit-dashboard">
                    <section class="habit-card">
                        <h2>Streak วันนี้</h2>
                        <div class="streak-badge">7</div>
                    </section>

                    <section class="habit-card">
                        <h2>กิจวัตรประจำวัน</h2>
                        <ul class="habit-list">
                            <li>อ่านนิทาน 10 นาที</li>
                            <li>เขียนบันทึกความรู้สึก</li>
                            <li>ทบทวนคำศัพท์ใหม่</li>
                        </ul>
                    </section>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้าสร้างตัวละคร" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
