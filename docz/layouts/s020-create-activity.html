<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Create Activity</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 5% 6% 5%;
            grid-column: 1 / 3;
            display: flex;
        }

        .create-card {
            width: 100%;
            border-radius: 36px;
            border: 3px solid #59d6dc;
            background: #f2ede5;
            box-shadow: 0 16px 48px -12px rgba(13, 18, 35, 0.22);
            padding: 2rem 2.6rem 2.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .create-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1.4rem;
        }

        .action-btn {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            border: 6px solid #1f1f1f;
            background: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .action-btn svg {
            width: 3.2rem;
            height: 3.2rem;
            stroke: #161616;
            stroke-width: 3;
            fill: none;
        }

        .create-title {
            margin: 0;
            text-align: center;
            font-size: 72px;
            font-weight: 700;
            border-bottom: 6px solid #1a1a1a;
            line-height: 1;
            padding-bottom: 0.4rem;
        }

        .form-panel {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            padding: 0.2rem 1rem 0;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 1rem;
        }

        .name-field {
            border-radius: 22px;
            background: #aa85e5;
            min-height: 5.2rem;
            display: block;
            font-size: 64px;
            line-height: 1;
            width: 100%;
            border: none;
            color: #fff;
            padding: 0 1.8rem;
            font-family: inherit;
            outline: none;
        }

        .name-field::placeholder {
            color: #f5f2ea;
            opacity: 1;
        }

        .name-field:focus {
            box-shadow: inset 0 0 0 4px rgba(255,255,255,0.45);
        }

        .name-icon {
            width: 5.2rem;
            height: 5.2rem;
            border-radius: 50%;
            background: #aa85e5;
            display: grid;
            place-items: center;
        }

        .name-icon svg {
            width: 2.9rem;
            height: 2.9rem;
            stroke: #fff;
            stroke-width: 2.3;
            fill: none;
        }

        .chip-line {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            min-height: 5rem;
        }

        .chip-label {
            font-size: 68px;
            line-height: 1;
            color: #111;
            min-width: 8.6rem;
        }

        .chip-track {
            flex: 1;
            border-radius: 24px;
            background: #b4b7bc;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            min-height: 4.9rem;
        }

        .chip {
            border: none;
            border-radius: 20px;
            background: transparent;
            color: #f5f2ea;
            font-family: inherit;
            font-size: 58px;
            line-height: 1;
            padding: 0.55rem 1rem 0.65rem;
            cursor: pointer;
        }

        .chip.is-selected {
            background: #a785e6;
            color: #fff;
        }

        .frequency-chip {
            min-width: 0;
        }

        .chip-plain {
            border: none;
            background: transparent;
            color: #111;
            font-family: inherit;
            font-size: 64px;
            padding: 0;
            line-height: 1;
            cursor: pointer;
        }

        .weekday-row {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 0.8rem;
            padding-top: 0.5rem;
        }

        .weekday {
            border: none;
            border-radius: 18px;
            font-family: inherit;
            font-size: 62px;
            line-height: 1;
            background: #b4b7bc;
            color: #f5f2ea;
            min-height: 5.2rem;
            cursor: pointer;
        }

        .weekday.is-selected {
            background: #a785e6;
            color: #fff;
            box-shadow: inset 0 0 0 4px #2f233f;
        }

        .option-panel {
            display: none;
        }

        .option-panel.is-active {
            display: block;
        }

        .count-row {
            margin-top: 0.2rem;
            margin-left: 11rem;
            width: min(100%, 38rem);
            min-height: 5.4rem;
            border-radius: 22px;
            background: #b4b7bc;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.2rem 0.4rem;
        }

        .count-num {
            width: 6.2rem;
            min-height: 4.7rem;
            border-radius: 18px;
            border: 4px solid #a785e6;
            color: #a785e6;
            background: #f2ede5;
            display: block;
            font-size: 64px;
            line-height: 1;
            text-align: center;
            font-family: inherit;
            outline: none;
            padding: 0;
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .count-num::-webkit-outer-spin-button,
        .count-num::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .count-unit {
            color: #f5f2ea;
            font-size: 62px;
            line-height: 1;
        }

        .importance-line {
            display: flex;
            align-items: center;
            gap: 1.1rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Create Activity">
        <section class="book-shell book-shell-tight">

            <section class="page" aria-label="สร้างกิจกรรม">
                <div class="create-card" role="dialog" aria-modal="true" aria-labelledby="create-title">
                    <header class="create-header">
                        <button class="action-btn" aria-label="ยกเลิก" data-navigate="s016-habit-add-activity.html">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>

                        <h2 class="create-title" id="create-title">เพิ่มกิจกรรม</h2>

                        <button class="action-btn" aria-label="บันทึก" data-navigate="s012-habit-daily-today.html">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </header>

                    <div class="form-panel">
                        <div class="name-row">
                            <input class="name-field" type="text" aria-label="ชื่อยา" placeholder="ชื่อยา :">
                            <div class="name-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24">
                                    <rect x="3" y="10" width="10" height="6" rx="3" transform="rotate(-45 8 13)"/>
                                    <rect x="11" y="8" width="10" height="6" rx="3" transform="rotate(45 16 11)"/>
                                </svg>
                            </div>
                        </div>

                        <div class="chip-line">
                            <div class="chip-track" style="max-width: 18rem;" data-single-select="true">
                                <button class="chip">ก่อน</button>
                                <button class="chip is-selected">หลัง</button>
                            </div>
                            <button class="chip-plain">อาหาร</button>
                        </div>

                        <div class="chip-line">
                            <div class="chip-label">มื้อ</div>
                            <div class="chip-track" data-multi-select="true">
                                <button class="chip is-selected" type="button">เช้า</button>
                                <button class="chip" type="button">กลางวัน</button>
                                <button class="chip is-selected" type="button">เย็น</button>
                                <button class="chip" type="button">ก่อนนอน</button>
                            </div>
                        </div>

                        <div class="chip-line">
                            <div class="chip-label">ความถี่</div>
                            <div class="chip-track">
                                <button class="chip frequency-chip is-selected" data-frequency="daily">ทุกวัน</button>
                                <button class="chip frequency-chip" data-frequency="weekly">สัปดาห์</button>
                                <button class="chip frequency-chip" data-frequency="monthly">เดือน</button>
                                <button class="chip frequency-chip" data-frequency="todo">To-do</button>
                            </div>
                        </div>

                        <div class="option-panel is-active" data-panel="daily">
                            <div class="weekday-row" aria-label="เลือกวัน" data-multi-select="true">
                                <button class="weekday" type="button">อา</button>
                                <button class="weekday is-selected" type="button">จ</button>
                                <button class="weekday is-selected" type="button">อ</button>
                                <button class="weekday is-selected" type="button">พ</button>
                                <button class="weekday is-selected" type="button">พฤ</button>
                                <button class="weekday is-selected" type="button">ศ</button>
                                <button class="weekday" type="button">ส</button>
                            </div>
                        </div>

                        <div class="option-panel" data-panel="weekly">
                            <div class="count-row" aria-label="จำนวนวันต่อสัปดาห์">
                                <input class="count-num" type="number" min="0" step="1" value="3" aria-label="จำนวนวันต่อสัปดาห์">
                                <div class="count-unit">วัน/สัปดาห์</div>
                            </div>
                        </div>

                        <div class="option-panel" data-panel="monthly">
                            <div class="count-row" aria-label="จำนวนวันต่อเดือน">
                                <input class="count-num" type="number" min="0" step="1" value="3" aria-label="จำนวนวันต่อเดือน">
                                <div class="count-unit">วัน/เดือน</div>
                            </div>
                        </div>

                        <div class="option-panel" data-panel="todo">
                            <div class="importance-line">
                                <div class="chip-label">ความสำคัญ</div>
                                <div class="chip-track" data-single-select="true">
                                    <button class="chip">ทั่วไป</button>
                                    <button class="chip">ปานกลาง</button>
                                    <button class="chip is-selected">มาก</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
    <script>
        const frequencyChips = document.querySelectorAll(".frequency-chip");
        const optionPanels = document.querySelectorAll(".option-panel");
        const chipTracks = document.querySelectorAll(".chip-track");
        const weekdayRows = document.querySelectorAll(".weekday-row");

        frequencyChips.forEach((chip) => {
            chip.addEventListener("click", () => {
                const targetPanel = chip.dataset.frequency;

                frequencyChips.forEach((item) => item.classList.remove("is-selected"));
                chip.classList.add("is-selected");

                optionPanels.forEach((panel) => {
                    panel.classList.toggle("is-active", panel.dataset.panel === targetPanel);
                });
            });
        });

        chipTracks.forEach((track) => {
            track.addEventListener("click", (event) => {
                const chip = event.target.closest(".chip");

                if (!chip || chip.classList.contains("frequency-chip")) {
                    return;
                }

                if (track.dataset.singleSelect === "true") {
                    track.querySelectorAll(".chip").forEach((item) => item.classList.remove("is-selected"));
                    chip.classList.add("is-selected");
                    return;
                }

                chip.classList.toggle("is-selected");
            });
        });

        weekdayRows.forEach((row) => {
            row.addEventListener("click", (event) => {
                const day = event.target.closest(".weekday");

                if (!day) {
                    return;
                }

                day.classList.toggle("is-selected");
            });
        });
    </script>
</body>
</html>
