<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Chapters</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .chapter-diamond {
            width: 72%;
            height: 86%;
            border-radius: 38% 38% 9% 9% / 20% 20% 9% 9%;
            background: #55d0d7;
            position: relative;
            overflow: hidden;
            display: grid;
            place-items: center;
        }

        .chapter-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: inherit;
        }

        .chapter-diamond h1 {
            margin: 0;
            font-size: 74px;
            font-weight: 500;
            z-index: 1;
        }

        .chapters-dashboard {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3rem;
            padding-top: 8%;
        }

        .chapter-card {
            border-radius: 48px;
            background: #59d6dc;
            min-height: 292px;
            position: relative;
            overflow: hidden;
            padding: 2rem 2.4rem;
            display: flex;
            align-items: center;
        }

        .chapter-card h2 {
            margin: 0;
            font-size: 68px;
            font-weight: 500;
            line-height: 0.95;
            position: relative;
            z-index: 1;
        }

        .chapter-card-top {
            justify-content: center;
            text-align: center;
        }

        .chapter-card-top::before,
        .chapter-card-top::after {
            content: "";
            position: absolute;
            width: 180px;
            height: 3px;
            background: rgba(59, 137, 176, 0.42);
            transform: rotate(47deg);
        }

        .chapter-card-top::before {
            right: 9%;
            top: 20%;
        }

        .chapter-card-top::after {
            right: 4%;
            top: 28%;
        }

        .chapter-card-bottom {
            align-self: end;
            justify-content: flex-end;
        }

        .ebook-arch {
            position: absolute;
            left: 3rem;
            bottom: 1.4rem;
            width: 9.8rem;
            height: 12.8rem;
            border-radius: 4.8rem 4.8rem 0 0;
            background: #508db9;
        }

        .ebook-step {
            position: absolute;
            left: 3.3rem;
            bottom: 2rem;
            width: 4.8rem;
            height: 1.15rem;
            background: #f0f3f5;
            border: 2px solid rgba(34, 70, 98, 0.2);
        }

        .ebook-step.s2 {
            left: 5rem;
            bottom: 3.05rem;
            width: 6.1rem;
        }

        .ebook-step.s3 {
            left: 6.4rem;
            bottom: 4.15rem;
            width: 4.4rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #08c65a;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Chapters Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Story summary preview">
                <article class="chapter-diamond">
                    <img src="images/story-preview-870x975.svg" class="chapter-bg-img" alt="" aria-hidden="true">
                    <h1>เนื้อเรื่อง</h1>
                </article>
            </section>

            <section class="page page-right" aria-label="Story chapter navigation">
                <div class="chapters-dashboard">
                    <section class="chapter-card chapter-card-top">
                        <h2>ดาวแห่ง<br>การเรียนรู้</h2>
                    </section>

                    <section class="chapter-card chapter-card-bottom">
                        <div class="ebook-arch" aria-hidden="true"></div>
                        <div class="ebook-step" aria-hidden="true"></div>
                        <div class="ebook-step s2" aria-hidden="true"></div>
                        <div class="ebook-step s3" aria-hidden="true"></div>
                        <h2>E-book</h2>
                    </section>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง" aria-current="page">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้าสร้างตัวละคร">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
