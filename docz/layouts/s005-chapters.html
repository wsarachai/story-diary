<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Chapters</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .chapter-diamond-wrap {
            width: 72%;
            height: 86%;
            display: grid;
            place-items: center;
        }

        .chapter-diamond-wrap-link {
            text-decoration: none;
            color: inherit;
        }

        .chapter-diamond {
            width: 78%;
            aspect-ratio: 1 / 1;
            background: #55d0d7;
            border-radius: 12%;
            transform: rotate(45deg);
            position: relative;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .chapter-diamond-inner {
            transform: rotate(-45deg);
            text-align: center;
            width: 100%;
            position: relative;
            top: -7%;
        }

        .chapter-diamond h1 {
            margin: 0;
            font-size: 66px;
            font-weight: 500;
            line-height: 1;
        }

        .diamond-motif {
            margin: 2.2rem auto 0;
            width: 72%;
            color: rgba(67, 126, 172, 0.9);
            font-size: 1.85rem;
            letter-spacing: 0.15rem;
            white-space: nowrap;
            opacity: 0.9;
        }

        .diamond-tail {
            width: 46%;
            height: 5.6rem;
            margin: 0.5rem auto 0;
            border-radius: 999px;
            background: radial-gradient(circle at 50% 0, rgba(67, 126, 172, 0.5) 0 22%, transparent 23%),
                        radial-gradient(circle at 50% 100%, rgba(67, 126, 172, 0.42) 0 20%, transparent 21%);
            opacity: 0.86;
        }

        .chapters-dashboard {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3rem;
            padding-top: 8%;
        }

        .chapter-card {
            border-radius: 48px;
            background: #59d6dc;
            min-height: 250px;
            position: relative;
            overflow: hidden;
            padding: 2rem;
            display: flex;
            align-items: center;
        }

        .chapter-card h2 {
            margin: 0;
            font-size: 66px;
            font-weight: 500;
            line-height: 0.95;
            position: relative;
            z-index: 1;
        }

        .chapter-card-top {
            justify-content: center;
        }

        .learning-logo {
            width: 84%;
            max-width: 25rem;
            height: 100%;
            border-radius: 32px;
            position: relative;
            display: grid;
            place-items: center;
            text-align: center;
        }

        .learning-logo h2 {
            font-size: 56px;
        }

        .learning-logo::before,
        .learning-logo::after {
            content: "";
            position: absolute;
            right: 8%;
            width: 9.2rem;
            height: 3px;
            background: rgba(67, 126, 172, 0.58);
            transform: rotate(48deg);
            transform-origin: right center;
        }

        .learning-logo::before {
            top: 22%;
        }

        .learning-logo::after {
            top: 34%;
            right: 5%;
            width: 8rem;
        }

        .chapter-card-bottom {
            align-self: end;
            justify-content: flex-end;
        }

        .ebook-arch {
            position: absolute;
            left: 3rem;
            bottom: 1.4rem;
            width: 9.8rem;
            height: 12.8rem;
            border-radius: 4.8rem 4.8rem 0 0;
            background: #508db9;
        }

        .ebook-step {
            position: absolute;
            left: 3.3rem;
            bottom: 2rem;
            width: 4.8rem;
            height: 1.15rem;
            background: #f0f3f5;
            border: 2px solid rgba(34, 70, 98, 0.2);
        }

        .ebook-step.s2 {
            left: 5rem;
            bottom: 3.05rem;
            width: 6.1rem;
        }

        .ebook-step.s3 {
            left: 6.4rem;
            bottom: 4.15rem;
            width: 4.4rem;
        }

        .chapter-card-bottom h2 {
            font-size: 74px;
            margin-right: 1.4rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #08c65a;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Chapters Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Story summary preview">
                <a class="chapter-diamond-wrap chapter-diamond-wrap-link" href="s008-chapters-menu.html" aria-label="ไปหน้าเมนูบท">
                    <div class="chapter-diamond">
                        <div class="chapter-diamond-inner">
                            <h1>เนื้อเรื่อง</h1>
                            <div class="diamond-motif" aria-hidden="true">✦ ✧ ✦ ✦ ✧ ✦</div>
                            <div class="diamond-tail" aria-hidden="true"></div>
                        </div>
                    </div>
                </a>
            </section>

            <section class="page page-right" aria-label="Story chapter navigation">
                <div class="chapters-dashboard">
                    <section class="chapter-card chapter-card-top">
                        <div class="learning-logo" aria-label="ดาวแห่งการเรียนรู้">
                            <h2>ดาว<br>แห่ง<br>การเรียนรู้</h2>
                        </div>
                    </section>

                    <section class="chapter-card chapter-card-bottom">
                        <div class="ebook-arch" aria-hidden="true"></div>
                        <div class="ebook-step" aria-hidden="true"></div>
                        <div class="ebook-step s2" aria-hidden="true"></div>
                        <div class="ebook-step s3" aria-hidden="true"></div>
                        <h2>E-book</h2>
                    </section>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง" aria-current="page">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้าสร้างตัวละคร">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
