<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Habit Weekly Tracker</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            grid-column: 1 / 3;
            padding: 5% 6% 5%;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 2rem;
        }

        .weekly-content {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 23rem;
            gap: 2rem;
            min-height: 0;
            align-items: stretch;
        }

        /* ── Shared header ── */
        .tracker-section-title {
            margin: 0;
            font-size: 72px;
            font-weight: 700;
            color: var(--panel-blue-deep);
            line-height: 1;
        }

        .tracker-tab-row {
            display: flex;
            gap: 1rem;
        }

        .tracker-tab {
            border-radius: 999px;
            padding: 0.55rem 1.8rem;
            font-size: 38px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            color: var(--ink);
        }

        .tracker-tab.is-active {
            background: #6a24f2;
            color: #fff;
        }

        .tracker-tab:not(.is-active) {
            background: rgba(89,214,220,0.35);
        }

        /* ── Weekly grid ── */
        .weekly-grid {
            flex: 1;
            overflow: hidden;
            border-radius: 28px;
            background: #edf9fa;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
        }

        .weekly-day-header {
            display: grid;
            grid-template-columns: 2fr repeat(7, 1fr);
            background: #59d6dc;
            border-radius: 28px 28px 0 0;
            padding: 0.8rem 1rem;
            gap: 0.5rem;
        }

        .weekly-day-header span {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .weekly-day-header span:first-child {
            text-align: left;
            padding-left: 0.5rem;
        }

        .weekly-rows {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .weekly-row {
            display: grid;
            grid-template-columns: 2fr repeat(7, 1fr);
            padding: 0.6rem 1rem;
            gap: 0.5rem;
            align-items: center;
            border-bottom: 2px solid rgba(89,214,220,0.2);
        }

        .weekly-row:last-child {
            border-bottom: none;
        }

        .weekly-row-label {
            font-size: 36px;
            font-weight: 600;
            padding-left: 0.5rem;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .weekly-cell {
            display: grid;
            place-items: center;
        }

        .weekly-dot {
            width: 2.8rem;
            height: 2.8rem;
            border-radius: 50%;
            border: 3px solid #59d6dc;
            background: #fff;
        }

        .weekly-dot.done {
            background: #08c65a;
            border-color: #08c65a;
        }

        .weekly-dot.skip {
            background: #f4a261;
            border-color: #f4a261;
        }

        /* ── Right page: summary cards ── */
        .weekly-summary-card {
            border-radius: 32px;
            background: #59d6dc;
            padding: 2rem 2.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .weekly-summary-card h3 {
            margin: 0;
            font-size: 48px;
            font-weight: 600;
        }

        .weekly-summary-badge {
            font-size: 72px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .weekly-legend {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 1.2rem;
        }

        .weekly-summary-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 1.4rem;
        }

        .legend-dot {
            width: 2.4rem;
            height: 2.4rem;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-label {
            font-size: 38px;
        }

        /* ── Nav rail ── */
        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Weekly Tracker">

            <!-- Left page: weekly grid -->
            <section class="page page-left page-seam-right" aria-label="ตาราง weekly tracker">

                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot skip"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>

                            <div class="weekly-row" role="row">
                                <span class="weekly-row-label">อาหาร 5 หมู่</span>

                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                            </div>
                            <div class="weekly-row" role="row">
                                <span class="weekly-row-label">ออกกำลังกาย</span>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>

                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                            </div>
                            <div class="weekly-row" role="row">
                                <span class="weekly-row-label">ป้องกันแสงแดด</span>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot skip"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                            </div>
                            <div class="weekly-row" role="row">
                                <span class="weekly-row-label">ป้องกันการติดเชื้อ</span>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot done"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                                <div class="weekly-cell"><div class="weekly-dot"></div></div>
                            </div>
                        </div>
                    </div>

                    <div class="weekly-summary-column" aria-label="สรุปสัปดาห์">
                        <div class="weekly-summary-card">
                            <h3>ทำได้แล้ว</h3>
                            <span class="weekly-summary-badge">17</span>
                        </div>

                        <div class="weekly-summary-card">
                            <h3>เป้าหมายสัปดาห์</h3>
                            <span class="weekly-summary-badge">35</span>

                        <div class="weekly-legend">
                            <div class="legend-row">
                                <div class="legend-dot" style="background:#08c65a;"></div>
                                <span class="legend-label">ทำเสร็จ</span>
                            </div>
                            <div class="legend-row">
                                <div class="legend-dot" style="background:#f4a261;"></div>
                                <span class="legend-label">ข้ามไป</span>
                            </div>
                            <div class="legend-row">
                                <div class="legend-dot" style="background:#fff; border:3px solid #59d6dc;"></div>
                                <span class="legend-label">ยังไม่ถึง</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
