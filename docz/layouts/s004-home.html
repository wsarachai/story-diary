<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Home</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .story-card {
            width: 72%;
            height: 86%;
            border-radius: 38% 38% 9% 9% / 20% 20% 9% 9%;
            background: #55d0d7;
            position: relative;
            overflow: hidden;
        }

        .story-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: inherit;
        }

        .story-card-title {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 10%;
            margin: 0;
            text-align: center;
            font-size: 56px;
            font-weight: 500;
            z-index: 1;
        }

        .dashboard {
            height: 100%;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.8rem;
        }

        .dashboard-main {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3rem;
            padding-top: 8%;
        }

        .feature-card {
            position: relative;
            border-radius: 48px;
            background: #59d6dc;
            padding: 1.6rem 1.8rem;
            min-height: 210px;
        }

        .feature-card h2 {
            margin: 0;
            font-size: 40px;
            font-weight: 500;
            line-height: 1.05;
        }

        .habit-bar {
            position: absolute;
            right: -5%;
            top: 55%;
            width: 44%;
            height: 18%;
            border-radius: 999px 0 0 999px;
            background: linear-gradient(90deg, #6f8aa7 0%, #5f7997 100%);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.18);
        }

        .minigame-card {
            align-self: end;
            min-height: 200px;
            padding-top: 2.3rem;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .minigame-hearts {
            position: absolute;
            left: 1.88rem;
            top: 1.5rem;
            display: flex;
            gap: 0.45rem;
        }

        .minigame-hearts img {
            width: 3rem;
            height: 3rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding-top: 1.8rem;
        }

        .icon-rail-link {
            display: block;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 1.3rem;
            overflow: hidden;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Home Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Story summary preview">
                <article class="story-card">
                    <img src="images/story-preview-870x975.svg" class="story-bg-img" alt="" aria-hidden="true">
                    <h1 class="story-card-title">เนื้อเรื่อง</h1>
                </article>
            </section>

            <section class="page page-right" aria-label="Home navigation and features">
                <div class="dashboard">
                    <div class="dashboard-main">
                        <section class="feature-card">
                            <h2>Habit tracker</h2>
                            <div class="habit-bar" aria-hidden="true"></div>
                        </section>

                        <section class="feature-card minigame-card">
                            <div class="minigame-hearts" aria-hidden="true">
                                <img src="assets/icons/heart.svg" alt="">
                                <img src="assets/icons/heart.svg" alt="">
                                <img src="assets/icons/heart.svg" alt="">
                            </div>
                            <h2>Minigame</h2>
                        </section>
                    </div>

                    <nav class="icon-rail" aria-label="Main navigation">
                        <a class="icon-rail-link" href="s001-Landing-Screen.html" aria-label="ไปหน้าแรก">
                            <img src="assets/icons/home.svg" alt="">
                        </a>
                        <a class="icon-rail-link" href="s002-Login-Screen.html" aria-label="ไปหน้าอ่านบันทึก">
                            <img src="assets/icons/book.svg" alt="">
                        </a>
                        <a class="icon-rail-link" href="s003-register.html" aria-label="ไปหน้าสร้างตัวละคร">
                            <img src="assets/icons/edit.svg" alt="">
                        </a>
                        <a class="icon-rail-link" href="#" aria-label="ไปหน้ามินิเกม">
                            <img src="assets/icons/game.svg" alt="">
                        </a>
                    </nav>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
