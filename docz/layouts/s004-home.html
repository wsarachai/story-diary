<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Home</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .story-card {
            width: 72%;
            height: 86%;
            border-radius: 38% 38% 9% 9% / 20% 20% 9% 9%;
            background:
                radial-gradient(circle at 22% 10%, rgba(10, 126, 176, 0.9) 0 1.2%, transparent 1.3%),
                radial-gradient(circle at 40% 12%, rgba(10, 126, 176, 0.9) 0 1.6%, transparent 1.7%),
                radial-gradient(circle at 54% 14%, rgba(10, 126, 176, 0.9) 0 1.2%, transparent 1.3%),
                radial-gradient(circle at 65% 7%, rgba(10, 126, 176, 0.9) 0 0.8%, transparent 0.9%),
                radial-gradient(circle at 74% 15%, rgba(10, 126, 176, 0.9) 0 1.2%, transparent 1.3%),
                linear-gradient(180deg, #5bd7df 0%, #55d0d7 100%);
            position: relative;
            overflow: hidden;
        }

        .story-card::before {
            content: "";
            position: absolute;
            inset: 8% 8% auto 8%;
            height: 34%;
            background:
                radial-gradient(circle at 0 0, transparent 19px, rgba(10, 126, 176, 0.8) 20px, transparent 21px) 0 0 / 120px 70px repeat-x,
                linear-gradient(rgba(10, 126, 176, 0.65), rgba(10, 126, 176, 0.65)) 8% 12% / 84% 2px no-repeat;
            opacity: 0.85;
        }

        .story-card::after {
            content: "";
            position: absolute;
            right: 10%;
            top: 28%;
            width: 10%;
            height: 42%;
            background:
                linear-gradient(180deg, rgba(10, 126, 176, 0.55) 0 100%) 50% 0 / 2px 100% no-repeat,
                radial-gradient(circle at 50% 8%, rgba(10, 126, 176, 0.8) 0 9%, transparent 10%),
                radial-gradient(circle at 50% 58%, rgba(10, 126, 176, 0.8) 0 9%, transparent 10%),
                radial-gradient(circle at 50% 82%, rgba(10, 126, 176, 0.8) 0 9%, transparent 10%);
            opacity: 0.75;
        }

        .story-card-title {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 10%;
            margin: 0;
            text-align: center;
            font-size: 74px;
            font-weight: 500;
        }

        .dashboard {
            height: 100%;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.2rem;
        }

        .dashboard-main {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 2rem;
            padding-top: 8%;
        }

        .feature-card {
            position: relative;
            border-radius: 32px;
            background: #59d6dc;
            padding: 1.4rem 1.6rem;
            min-height: 180px;
        }

        .feature-card h2 {
            margin: 0;
            font-size: 64px;
            font-weight: 500;
            line-height: 1.05;
        }

        .habit-bar {
            position: absolute;
            right: -5%;
            top: 55%;
            width: 44%;
            height: 18%;
            border-radius: 999px 0 0 999px;
            background: linear-gradient(90deg, #6f8aa7 0%, #5f7997 100%);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.18);
        }

        .minigame-card {
            align-self: end;
            min-height: 175px;
            padding-top: 2.3rem;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .minigame-hearts {
            position: absolute;
            left: 1.25rem;
            top: 1rem;
            display: flex;
            gap: 0.3rem;
        }

        .minigame-hearts img {
            width: 3rem;
            height: 3rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.6rem;
            padding-top: 1.2rem;
        }

        .icon-rail-link {
            display: block;
            width: 4.25rem;
            height: 4.25rem;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Home Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Story summary preview">
                <article class="story-card">
                    <h1 class="story-card-title">เนื้อเรื่อง</h1>
                </article>
            </section>

            <section class="page page-right" aria-label="Home navigation and features">
                <div class="dashboard">
                    <div class="dashboard-main">
                        <section class="feature-card">
                            <h2>Habit tracker</h2>
                            <div class="habit-bar" aria-hidden="true"></div>
                        </section>

                        <section class="feature-card minigame-card">
                            <div class="minigame-hearts" aria-hidden="true">
                                <img src="assets/icons/heart.svg" alt="">
                                <img src="assets/icons/heart.svg" alt="">
                                <img src="assets/icons/heart.svg" alt="">
                            </div>
                            <h2>Minigame</h2>
                        </section>
                    </div>

                    <nav class="icon-rail" aria-label="Main navigation">
                        <a class="icon-rail-link" href="s001-Landing-Screen.html" aria-label="ไปหน้าแรก">
                            <img src="assets/icons/home.svg" alt="">
                        </a>
                        <a class="icon-rail-link" href="s002-Login-Screen.html" aria-label="ไปหน้าอ่านบันทึก">
                            <img src="assets/icons/book.svg" alt="">
                        </a>
                        <a class="icon-rail-link" href="s003-register.html" aria-label="ไปหน้าสร้างตัวละคร">
                            <img src="assets/icons/edit.svg" alt="">
                        </a>
                        <a class="icon-rail-link" href="#" aria-label="ไปหน้ามินิเกม">
                            <img src="assets/icons/game.svg" alt="">
                        </a>
                    </nav>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
