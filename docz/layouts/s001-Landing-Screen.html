<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Landing</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        :root {
            --paper: #f8f2df;
            --book-spine: #0e98af;
            --leaf: #3b9f79;
            --button: #d7ece5;
        }

        .screen {
            isolation: isolate;
        }

        .paper-mail {
            position: absolute;
            left: 13%;
            top: 30%;
            width: 41%;
            aspect-ratio: 1.3 / 0.75;
            background: var(--paper);
            transform: rotate(-19deg);
            border-radius: 6px;
            box-shadow: 0 18px 24px -16px rgba(0, 0, 0, 0.35);
            z-index: 1;
        }

        .paper-mail::before,
        .paper-mail::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 3px solid #c46d20;
            border-radius: 6px;
            clip-path: polygon(0 0, 100% 0, 49% 52%);
        }

        .book-panel {
            position: absolute;
            right: 6%;
            top: 4%;
            width: 44%;
            height: 88%;
            border-radius: 36px;
            background: linear-gradient(180deg, #58d2d6 0%, #4ec6d1 100%);
            box-shadow: inset 0 -10px 30px rgba(0, 0, 0, 0.05);
            z-index: 2;
            overflow: hidden;
        }

        .book-spine {
            width: 11%;
            height: 100%;
            background: linear-gradient(180deg, #0f9eb5 0%, var(--book-spine) 100%);
        }

        .book-content {
            position: absolute;
            inset: 0;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 8%;
            padding: 0 8%;
            text-align: center;
        }

        .title {
            margin: 0;
            font-family: "Baloo 2", cursive;
            font-size: 80px;
            line-height: 0.95;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #071018;
        }

        .leaves,
        .leaves-bottom {
            position: absolute;
            pointer-events: none;
            filter: saturate(1.1);
        }

        .leaves {
            top: 4%;
            right: 5%;
            width: 42%;
            height: 16%;
            background:
                radial-gradient(ellipse 30% 45% at 10% 60%, var(--leaf), transparent 75%),
                radial-gradient(ellipse 22% 35% at 26% 32%, #4cb180, transparent 75%),
                radial-gradient(ellipse 26% 36% at 44% 70%, #3f9f71, transparent 75%),
                radial-gradient(ellipse 30% 40% at 62% 40%, #51b088, transparent 75%),
                radial-gradient(ellipse 25% 38% at 80% 70%, #42a57f, transparent 75%);
        }

        .leaves-bottom {
            bottom: -1%;
            left: 23%;
            width: 58%;
            height: 20%;
            background:
                radial-gradient(ellipse 20% 60% at 8% 58%, #8dc4a0, transparent 76%),
                radial-gradient(ellipse 19% 62% at 26% 46%, #7db495, transparent 76%),
                radial-gradient(ellipse 22% 62% at 44% 58%, #93c6aa, transparent 76%),
                radial-gradient(ellipse 18% 56% at 64% 52%, #83bb9a, transparent 76%),
                radial-gradient(ellipse 24% 60% at 84% 54%, #97caae, transparent 76%);
            opacity: 0.95;
        }

        .start-button {
            border: 0;
            border-radius: 28px;
            background: var(--button);
            color: #06080a;
            text-decoration: none;
            font-weight: 600;
            font-size: 44px;
            letter-spacing: 0.01em;
            line-height: 1;
            padding: 0.7em 1.2em;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
            box-shadow: 0 11px 24px -14px rgba(0, 0, 0, 0.55);
            z-index: 3;
        }

        .start-button:hover {
            transform: translateY(-2px);
            background: #dff2eb;
            box-shadow: 0 14px 26px -12px rgba(0, 0, 0, 0.55);
        }

        .start-button:focus-visible {
            outline: 4px solid #0f9eb5;
            outline-offset: 4px;
        }

    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-mobile-portrait" aria-label="Story Diary Landing">
        <div class="paper-mail" aria-hidden="true"></div>

        <section class="book-panel">
            <div class="book-spine" aria-hidden="true"></div>
            <div class="leaves" aria-hidden="true"></div>
            <div class="book-content">
                <h1 class="title">Story<br>Diary</h1>
                <button class="start-button" type="button" data-navigate="s002-Login-Screen.html" aria-label="เริ่มใช้งาน Story Diary">-กดเพื่อเริ่ม-</button>
            </div>
            <div class="leaves-bottom" aria-hidden="true"></div>
        </section>

        <p class="screen-note">
            Recommended artboard: 1280x750. Safe interactive zone: center 70%.
        </p>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
