<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Minigame</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            display: grid;
            place-items: center;
        }

        .page-right {
            padding: 7% 7% 6%;
        }

        .game-card {
            width: 72%;
            height: 86%;
            border-radius: 38% 38% 9% 9% / 20% 20% 9% 9%;
            background: #55d0d7;
            position: relative;
            overflow: hidden;
        }

        .game-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            border-radius: inherit;
            opacity: 0.45;
        }

        .game-card-title {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 10%;
            margin: 0;
            text-align: center;
            font-size: 58px;
            font-weight: 500;
            z-index: 1;
        }

        .minigame-dashboard {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 3rem;
            padding-top: 8%;
        }

        .minigame-card {
            border-radius: 48px;
            background: #59d6dc;
            padding: 1.8rem 2rem;
            min-height: 210px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .minigame-card h2 {
            margin: 0;
            font-size: 38px;
            font-weight: 500;
            line-height: 1.05;
        }

        .badge-pill {
            padding: 0.45rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.52);
            font-weight: 600;
            color: #1d6377;
            white-space: nowrap;
        }

        .life-strip {
            display: flex;
            gap: 0.45rem;
        }

        .life-strip img {
            width: 2.2rem;
            height: 2.2rem;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0, 0, 0, 0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #c771e8;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Minigame Layout">
        <section class="book-shell book-shell-tight book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-label="Minigame summary preview">
                <article class="game-card">
                    <img src="images/story-preview-870x975.svg" class="game-bg-img" alt="" aria-hidden="true">
                    <h1 class="game-card-title">Minigame</h1>
                </article>
            </section>

            <section class="page page-right" aria-label="Minigame actions and progress">
                <div class="minigame-dashboard">
                    <section class="minigame-card">
                        <h2>เกมคำศัพท์</h2>
                        <span class="badge-pill">เริ่มเล่น</span>
                    </section>

                    <section class="minigame-card">
                        <h2>พลังชีวิต</h2>
                        <div class="life-strip" aria-hidden="true">
                            <img src="assets/icons/heart.svg" alt="">
                            <img src="assets/icons/heart.svg" alt="">
                            <img src="assets/icons/heart.svg" alt="">
                        </div>
                    </section>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s006-habit-tracker.html" aria-label="ไปหน้าสร้างตัวละคร">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม" aria-current="page">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
