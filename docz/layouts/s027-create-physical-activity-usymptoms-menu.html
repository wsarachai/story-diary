<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Unusual Symptoms Checkin</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 5% 6% 5%;
            grid-column: 1 / 3;
            display: flex;
        }

        .checkin-card {
            width: 100%;
            border-radius: 36px;
            border: 3px solid #59d6dc;
            background: #f2ede5;
            box-shadow: 0 16px 48px -12px rgba(13,18,35,0.22);
            padding: 1.6rem 2.4rem 2.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .checkin-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1.4rem;
        }

        .action-btn {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            border: 6px solid #1f1f1f;
            background: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .action-btn svg {
            width: 3.2rem;
            height: 3.2rem;
            stroke: #161616;
            stroke-width: 3;
            fill: none;
        }

        .checkin-title {
            margin: 0;
            text-align: center;
            font-size: 72px;
            font-weight: 700;
            border-bottom: 6px solid #111;
            line-height: 1;
            padding-bottom: 0.45rem;
        }

        .activity-badge-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .activity-badge {
            border-radius: 22px;
            background: #22b14c;
            color: #fff;
            font-size: 66px;
            line-height: 1.05;
            padding: 0.75rem 1.3rem;
            width: fit-content;
        }

        .activity-dot {
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 50%;
            background: #22b14c;
            flex-shrink: 0;
        }

        .checklist-title {
            margin: 0;
            font-size: 70px;
            line-height: 1.05;
            font-weight: 500;
        }

        .checklist {
            margin: 0;
            padding: 0.1rem 0 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .check-item-btn {
            width: 3rem;
            height: 3rem;
            border-radius: 0.65rem;
            border: 5px solid #22b14c;
            background: transparent;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
            flex-shrink: 0;
        }

        .check-item-btn svg {
            display: none;
            width: 1.8rem;
            height: 1.8rem;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
        }

        .check-item-btn.is-selected {
            background: #22b14c;
            border-color: #22b14c;
        }

        .check-item-btn.is-selected svg {
            display: block;
        }

        .check-item-text {
            margin: 0;
            font-size: 72px;
            line-height: 1.05;
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Unusual Symptoms Checkin">
        <section class="book-shell book-shell-tight">

            <section class="page" aria-label="สังเกตอาการผิดปกติ">
                <div class="checkin-card" role="dialog" aria-modal="true" aria-labelledby="checkin-title">
                    <header class="checkin-header">
                        <button class="action-btn" aria-label="ยกเลิก" data-navigate="s024-create-physical-activity-menu.html">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

                    <div class="activity-badge-row">

                    <ul class="checklist" aria-label="เช็กลิสต์อาการผิดปกติ">
                        <li class="check-item">
                            <button class="check-item-btn" type="button" aria-label="เลือกอาการ xxx รายการที่ 1">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <p class="check-item-text">อาการ xxx</p>
                        </li>
                        <li class="check-item">
                            <button class="check-item-btn" type="button" aria-label="เลือกอาการ xxx รายการที่ 2">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <p class="check-item-text">อาการ xxx</p>
                        </li>
                        <li class="check-item">
                            <button class="check-item-btn" type="button" aria-label="เลือกอาการ xxx รายการที่ 3">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <p class="check-item-text">อาการ xxx</p>
                        </li>
                        <li class="check-item">
                            <button class="check-item-btn" type="button" aria-label="เลือกอาการ xxx รายการที่ 4">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <p class="check-item-text">อาการ xxx</p>
                        </li>
                        <li class="check-item">
                            <button class="check-item-btn" type="button" aria-label="เลือกอาการ xxx รายการที่ 5">
                                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <p class="check-item-text">อาการ xxx</p>
                        </li>
                    </ul>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
    <script>
        document.querySelectorAll('.check-item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('is-selected');
                const label = btn.getAttribute('aria-label') || 'อาการ';
                btn.setAttribute('aria-pressed', btn.classList.contains('is-selected') ? 'true' : 'false');
            });
        });
    </script>
</body>
</html>
