<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Habit Monthly Tracker</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 0;
        }

        .page-left {
            grid-column: 1 / 3;
            padding: 5% 6% 5%;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 1.6rem;
            overflow: hidden;
        }

        .monthly-content {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            overflow: hidden;
            min-height: 0;
        }

        /* ── Headers ── */
        .tracker-section-title {
            margin: 0;
            font-size: 72px;
            font-weight: 700;
            color: var(--panel-blue-deep);
            line-height: 1;
        }

        .tracker-tab-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tracker-tab {
            border-radius: 999px;
            padding: 0.55rem 1.6rem;
            font-size: 36px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            color: var(--ink);
        }

        .tracker-tab.is-active {
            background: #6a24f2;
            color: #fff;
        }

        .tracker-tab:not(.is-active) {
            background: rgba(89,214,220,0.35);
        }

        /* ── Monthly grid (left page) ── */
        .monthly-grid-wrap {
            overflow: hidden;
            border-radius: 24px;
            background: #edf9fa;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .monthly-col-header {
            display: grid;
            grid-template-columns: 2.8fr repeat(31, minmax(0, 1fr));
            background: #59d6dc;
            border-radius: 24px 24px 0 0;
            padding: 0.5rem 0.6rem;
            gap: 0;
        }

        .monthly-col-header span {
            text-align: center;
            font-size: 21px;
            font-weight: 700;
            color: #fff;
            padding: 0.2rem 0;
        }

        .monthly-col-header span:first-child {
            text-align: left;
            padding-left: 0.4rem;
        }

        .monthly-body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .monthly-row {
            display: grid;
            grid-template-columns: 2.8fr repeat(31, minmax(0, 1fr));
            align-items: center;
            padding: 0.45rem 0.6rem;
            gap: 0;
            border-bottom: 1px solid rgba(89,214,220,0.2);
        }

        .monthly-row:last-child { border-bottom: none; }

        .monthly-row-label {
            font-size: 24px;
            font-weight: 600;
            padding-left: 0.4rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .monthly-cell {
            display: grid;
            place-items: center;
            padding: 0.2rem 0;
        }

        .m-dot {
            width: 1.45rem;
            height: 1.45rem;
            border-radius: 50%;
            border: 2px solid #59d6dc;
            background: #fff;
        }

        .m-dot.done  { background: #08c65a; border-color: #08c65a; }
        .m-dot.skip  { background: #f4a261; border-color: #f4a261; }
        .m-dot.today { border-color: #6a24f2; border-width: 3px; }

        /* ── Nav rail ── */
        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>

    <script src="assets/common.js"></script>
    <script>
        // Ensure each activity row has cells for all 31 days.
        document.querySelectorAll('.monthly-row').forEach((row) => {
            const existingCells = row.querySelectorAll('.monthly-cell').length;
            const missing = 31 - existingCells;

            for (let i = 0; i < missing; i += 1) {
                const cell = document.createElement('div');
                cell.className = 'monthly-cell';

                const dot = document.createElement('div');
                dot.className = 'm-dot';

                cell.appendChild(dot);
                row.appendChild(cell);
            }
        });
    </script>
