<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Login</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .page-left {
            background: #59d2d9;
        }

        .page-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7% 7% 5%;
        }

        .login-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .compass {
            position: absolute;
            pointer-events: none;
            left: 4.5%;
            bottom: 3.5%;
            width: 35%;
            aspect-ratio: 1;
            color: rgba(7, 126, 177, 0.95);
            z-index: 1;
        }

        .compass svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .form-wrap {
            width: 540px;
            display: grid;
            justify-items: center;
            gap: 1.4rem;
        }

        .title {
            margin: 0 0 2.25rem;
            font-size: 56px;
            line-height: 1.05;
            font-weight: 600;
        }

        .field-row {
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1.12fr) minmax(0, 1.28fr);
            align-items: center;
            background: var(--panel-blue);
            border-radius: 999px;
            padding: 0.45rem 0.55rem 0.45rem 1.2rem;
            min-height: 5rem;
            gap: 0.65rem;
        }

        .field-label {
            font-size: 30px;
            font-weight: 600;
            white-space: nowrap;
        }

        .field-input {
            width: 100%;
            min-width: 0;
            border: 0;
            border-radius: 999px;
            background: var(--field-fill);
            color: var(--ink);
            font-size: 20px;
            padding: 0.95rem 1.25rem;
            outline: none;
            font-family: inherit;
        }

        .field-input::placeholder {
            color: rgba(13, 18, 23, 0.38);
        }

        .field-input:focus {
            box-shadow: inset 0 0 0 3px rgba(10, 134, 179, 0.3);
        }

        .login-button {
            margin-top: 1.5rem;
            padding: 0.58em 1.2em;
            font-size: 40px;
            font-weight: 600;
            box-shadow: 0 14px 28px -18px rgba(0, 0, 0, 0.45);
        }

        .register-text {
            margin: 0.3rem 0 0;
            font-size: 22px;
            text-align: center;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen screen-landscape screen-book-mobile" aria-label="Story Diary Login Layout">
        <section class="book-shell book-shell-stack-mobile">
            <section class="page page-left page-seam-right" aria-hidden="true">
                <img src="images/login-bg-960x1080.svg" class="login-bg-img" alt="" aria-hidden="true">
                <div class="compass">
                    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <circle cx="100" cy="100" r="63" stroke="currentColor" stroke-width="5" opacity="0.95"/>
                        <path d="M100 27L113 82L100 100L87 82L100 27Z" fill="currentColor"/>
                        <path d="M100 173L87 118L100 100L113 118L100 173Z" fill="currentColor"/>
                        <path d="M27 100L82 87L100 100L82 113L27 100Z" fill="currentColor"/>
                        <path d="M173 100L118 113L100 100L118 87L173 100Z" fill="currentColor"/>
                        <path d="M100 62L109 91L100 100L91 91L100 62Z" fill="#58d8de"/>
                        <path d="M100 138L91 109L100 100L109 109L100 138Z" fill="#58d8de"/>
                        <path d="M62 100L91 91L100 100L91 109L62 100Z" fill="#58d8de"/>
                        <path d="M138 100L109 109L100 100L109 91L138 100Z" fill="#58d8de"/>
                        <text x="100" y="20" text-anchor="middle" fill="currentColor" font-size="18" font-family="Noto Sans Thai, sans-serif" font-weight="700">N</text>
                        <text x="100" y="193" text-anchor="middle" fill="currentColor" font-size="18" font-family="Noto Sans Thai, sans-serif" font-weight="700">S</text>
                        <text x="15" y="107" text-anchor="middle" fill="currentColor" font-size="18" font-family="Noto Sans Thai, sans-serif" font-weight="700">W</text>
                        <text x="185" y="107" text-anchor="middle" fill="currentColor" font-size="18" font-family="Noto Sans Thai, sans-serif" font-weight="700">E</text>
                    </svg>
                </div>
            </section>

            <section class="page page-right">
                <form class="form-wrap" action="#" method="post">
                    <h1 class="title">เข้าสู่ระบบ</h1>

                    <label class="field-row" for="username">
                        <span class="field-label">ชื่อผู้ใช้</span>
                        <input id="username" name="username" class="field-input" type="text" autocomplete="username" placeholder="" />
                    </label>

                    <label class="field-row" for="password">
                        <span class="field-label">รหัสผ่าน</span>
                        <input id="password" name="password" class="field-input" type="password" autocomplete="current-password" placeholder="" />
                    </label>

                    <button class="login-button rounded-pill-button" type="button" data-navigate="s004-home.html">เข้าสู่ระบบ</button>

                    <p class="register-text">
                        ยังไม่เคยลงทะเบียน?
                        <a href="s003-register.html" class="story-link">สร้างบัญชี</a>
                    </p>
                </form>
            </section>
        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
