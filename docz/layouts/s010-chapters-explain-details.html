<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Chapters Explain Details</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .chapter-details-screen {
            position: relative;
            isolation: isolate;
        }

        .chapter-details-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .speaker-figure {
            position: absolute;
            right: 22%;
            top: 7%;
            width: 30%;
            max-width: 540px;
            z-index: 1;
        }

        .dialog-panel {
            position: absolute;
            left: 1.5%;
            right: 1.5%;
            bottom: 7.5%;
            height: 31.5%;
            background: #e8e0d4;
            border: 5px solid #cb7b2b;
            border-radius: 56px;
            z-index: 2;
            padding: 4.8rem 4.4rem 2.8rem;
        }

        .speaker-name {
            position: absolute;
            top: -5.2rem;
            left: 3rem;
            margin: 0;
            padding: 0.9rem 2.1rem 1.05rem;
            border-radius: 34px;
            background: #cb7b2b;
            color: #fff7ec;
            font-size: 86px;
            font-weight: 500;
            line-height: 1;
        }

        .dialog-text {
            margin: 0;
            font-size: 96px;
            line-height: 1.06;
            color: #080b10;
            font-weight: 500;
        }

        .dialog-next {
            position: absolute;
            right: 3.2rem;
            bottom: 1.8rem;
            width: 0;
            height: 0;
            border-left: 31px solid transparent;
            border-right: 31px solid transparent;
            border-top: 54px solid #efb364;
            filter: drop-shadow(0 6px 7px rgba(55, 40, 20, 0.2));
        }

        .dialog-next-link {
            position: absolute;
            right: 1.8rem;
            bottom: 1rem;
            width: 7rem;
            height: 7rem;
            border-radius: 999px;
            z-index: 3;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen chapter-details-screen" aria-label="Story Diary Chapters Explain Details">
        <img class="chapter-details-bg" src="images/chapters-explain-bg-1920x1080.svg" alt="">
        <img class="speaker-figure" src="images/chapter-speaker-girl-transparent.png" alt="ตัวละครผู้พูด">

        <section class="dialog-panel" aria-label="บทสนทนา">
            <h1 class="speaker-name">ชื่อตัวละคร</h1>
            <p class="dialog-text">บทสนทนา</p>
            <div class="dialog-next" aria-hidden="true"></div>
            <a class="dialog-next-link" href="s008-chapters-menu.html" aria-label="กลับไปหน้าเลือกบท"></a>
        </section>
    </main>
</body>
</html>
