<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Diary - Nutrition Checkin</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        .book-shell {
            gap: 0;
            grid-template-columns: 1fr 1fr auto;
        }

        .page {
            padding: 5% 6% 5%;
            grid-column: 1 / 3;
            display: flex;
        }

        .checkin-card {
            width: 100%;
            border-radius: 36px;
            border: 3px solid #59d6dc;
            background: #f2ede5;
            box-shadow: 0 16px 48px -12px rgba(13,18,35,0.22);
            padding: 1.6rem 2.4rem 2.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        .checkin-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1.4rem;
        }

        .action-btn {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            border: 6px solid #1f1f1f;
            background: #fff;
            cursor: pointer;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .action-btn svg {
            width: 3.2rem;
            height: 3.2rem;
            stroke: #161616;
            stroke-width: 3;
            fill: none;
        }

        .checkin-title {
            margin: 0;
            text-align: center;
            font-size: 72px;
            font-weight: 700;
            border-bottom: 6px solid #111;
            line-height: 1;
            padding-bottom: 0.45rem;
        }

        .nutrition-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 0.9rem;
            margin-top: 0.2rem;
        }

        .nutrition-name {
            margin: 0;
            border-radius: 22px;
            background: #f26f5a;
            color: #fff;
            font-size: 64px;
            line-height: 1.05;
            padding: 0.75rem 1.2rem;
            width: fit-content;
            max-width: 100%;
        }

        .nutrition-icon {
            width: 5.2rem;
            height: 5.2rem;
            border-radius: 50%;
            background: #f26f5a;
            display: grid;
            place-items: center;
        }

        .nutrition-icon svg {
            width: 2.8rem;
            height: 2.8rem;
            stroke: #fff;
            stroke-width: 2.2;
            fill: none;
        }

        .meal-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            row-gap: 1rem;
            column-gap: 1rem;
            align-items: center;
            margin-top: 0.35rem;
        }

        .meal-label {
            margin: 0;
            font-size: 72px;
            line-height: 1;
            font-weight: 500;
            color: #111;
        }

        .meal-field {
            border: none;
            border-radius: 22px;
            background: #f26f5a;
            min-height: 4.9rem;
            color: #fff;
            font-family: inherit;
            font-size: 44px;
            padding: 0 1rem;
            outline: none;
        }

        .meal-field::placeholder {
            color: rgba(255,255,255,0.9);
        }

        .icon-rail {
            display: grid;
            align-content: start;
            gap: 0.9rem;
            padding: 1.8rem 1.4rem 1.8rem 0;
            position: relative;
            z-index: 2;
        }

        .icon-rail-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 0 1.3rem 1.3rem 0;
            overflow: visible;
            box-shadow: 0 12px 18px -16px rgba(0,0,0,0.55);
            position: relative;
            text-decoration: none;
        }

        .icon-rail-link img {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            border-radius: 0 1.3rem 1.3rem 0;
        }

        .icon-rail-link.is-active::before {
            content: "";
            position: absolute;
            left: -3rem;
            top: 0;
            width: calc(100% + 3rem);
            height: 100%;
            border-radius: 0 1.3rem 1.3rem 0;
            background: #6a24f2;
            z-index: 0;
        }
    </style>
</head>
<body class="story-diary-body">
    <main class="screen" aria-label="Story Diary Nutrition Checkin">
        <section class="book-shell book-shell-tight">

            <section class="page" aria-label="เช็กอินโภชนาการ">
                <div class="checkin-card" role="dialog" aria-modal="true" aria-labelledby="checkin-title">
                    <header class="checkin-header">
                        <button class="action-btn" aria-label="ยกเลิก" data-navigate="s012-habit-daily-today.html">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>

                        <h2 class="checkin-title" id="checkin-title">เพิ่มกิจกรรม</h2>

                        <button class="action-btn" aria-label="บันทึก" data-navigate="s012-habit-daily-today.html">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </header>

                    <div class="nutrition-row">
                        <p class="nutrition-name">รับประทานอาหารครบ 5 หมู่</p>
                        <div class="nutrition-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M3 2v7c0 1.66 1.34 3 3 3h1v9a1 1 0 0 0 2 0V5"/>
                                <path d="M18 2v20M15 2v6a3 3 0 0 0 6 0V2"/>
                            </svg>
                        </div>
                    </div>

                    <div class="meal-grid" aria-label="มื้ออาหาร">
                        <p class="meal-label">มื้อเช้า</p>
                        <input class="meal-field" type="text" aria-label="รายละเอียดมื้อเช้า">

                        <p class="meal-label">มื้อกลางวัน</p>
                        <input class="meal-field" type="text" aria-label="รายละเอียดมื้อกลางวัน">

                        <p class="meal-label">มื้อเย็น</p>
                        <input class="meal-field" type="text" aria-label="รายละเอียดมื้อเย็น">
                    </div>
                </div>
            </section>

            <nav class="icon-rail" aria-label="Main navigation">
                <a class="icon-rail-link" href="s004-home.html" aria-label="ไปหน้าแรก">
                    <img src="assets/icons/home.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s005-chapters.html" aria-label="ไปหน้าอ่านเนื้อเรื่อง">
                    <img src="assets/icons/book.svg" alt="">
                </a>
                <a class="icon-rail-link is-active" href="s006-habit-tracker.html" aria-label="ไปหน้า habit tracker" aria-current="page">
                    <img src="assets/icons/edit.svg" alt="">
                </a>
                <a class="icon-rail-link" href="s007-minigame.html" aria-label="ไปหน้ามินิเกม">
                    <img src="assets/icons/game.svg" alt="">
                </a>
            </nav>

        </section>
    </main>
    <script src="assets/common.js"></script>
</body>
</html>
